<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcTrace - 进程追踪与安全分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }
        
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        
        .dashboard {
            padding: 30px 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            border-color: #475569;
            transform: translateY(-2px);
        }
        
        .stat-card.high-risk {
            border-color: #ef4444;
            background: linear-gradient(135deg, #1e293b 0%, rgba(239, 68, 68, 0.1) 100%);
        }
        
        .stat-card.suspicious {
            border-color: #f59e0b;
            background: linear-gradient(135deg, #1e293b 0%, rgba(245, 158, 11, 0.1) 100%);
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #f8fafc;
        }
        
        .stat-value.danger {
            color: #ef4444;
        }
        
        .stat-value.warning {
            color: #f59e0b;
        }
        
        .charts-container {
            padding: 0 40px 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .chart-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        
        .chart-title {
            font-size: 16px;
            color: #e2e8f0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chart {
            height: 300px;
        }
        
        .process-list {
            padding: 0 40px 40px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .process-table {
            width: 100%;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        
        .process-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .process-table th {
            background: #0f172a;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .process-table td {
            padding: 16px;
            border-top: 1px solid #334155;
            font-size: 14px;
        }
        
        .process-table tr:hover {
            background: #252f47;
        }
        
        .risk-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .risk-high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .risk-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .risk-low {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        
        .risk-safe {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .threat-score {
            font-weight: 700;
        }
        
        .threat-score.high {
            color: #ef4444;
        }
        
        .threat-score.medium {
            color: #f59e0b;
        }
        
        .threat-score.low {
            color: #3b82f6;
        }
        
        .indicators {
            max-width: 300px;
            font-size: 12px;
            color: #94a3b8;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            .charts-container, .process-list {
                padding: 0 20px 20px;
            }
            .header {
                padding: 20px;
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🔍 ProcTrace</h1>
            <div class="subtitle">进程追踪与安全分析工具 | Process Security Analyzer</div>
        </div>
        <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
    </div>
    
    <div class="dashboard">
        <div class="stat-card">
            <div class="stat-label">总进程数</div>
            <div class="stat-value" id="total-processes">-</div>
        </div>
        <div class="stat-card suspicious">
            <div class="stat-label">可疑进程</div>
            <div class="stat-value warning" id="suspicious-count">-</div>
        </div>
        <div class="stat-card high-risk">
            <div class="stat-label">高风险进程</div>
            <div class="stat-value danger" id="high-risk-count">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">安全进程</div>
            <div class="stat-value" id="safe-count">-</div>
        </div>
    </div>
    
    <div class="charts-container">
        <div class="chart-card">
            <div class="chart-title">📊 风险分布</div>
            <div id="risk-chart" class="chart"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">🔥 CPU使用率 Top 10</div>
            <div id="cpu-chart" class="chart"></div>
        </div>
    </div>
    
    <div class="process-list">
        <h2 class="section-title">⚠️ 可疑进程列表</h2>
        <div class="process-table">
            <table>
                <thead>
                    <tr>
                        <th>PID</th>
                        <th>进程名称</th>
                        <th>用户</th>
                        <th>CPU %</th>
                        <th>内存 %</th>
                        <th>威胁评分</th>
                        <th>风险等级</th>
                        <th>可疑指标</th>
                    </tr>
                </thead>
                <tbody id="process-tbody">
                    <tr><td colspan="8" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let riskChart, cpuChart;
        
        function initCharts() {
            riskChart = echarts.init(document.getElementById('risk-chart'));
            cpuChart = echarts.init(document.getElementById('cpu-chart'));
        }
        
        function updateRiskChart(data) {
            const option = {
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#1e293b',
                    borderColor: '#334155',
                    textStyle: { color: '#e2e8f0' }
                },
                legend: {
                    orient: 'vertical',
                    right: 10,
                    top: 'center',
                    textStyle: { color: '#94a3b8' }
                },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['40%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 8,
                        borderColor: '#0f172a',
                        borderWidth: 2
                    },
                    label: {
                        show: false
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 16,
                            fontWeight: 'bold',
                            color: '#e2e8f0'
                        }
                    },
                    data: [
                        { value: data.safe || 0, name: '安全', itemStyle: { color: '#22c55e' } },
                        { value: data.low || 0, name: '低风险', itemStyle: { color: '#3b82f6' } },
                        { value: data.medium || 0, name: '中风险', itemStyle: { color: '#f59e0b' } },
                        { value: data.high || 0, name: '高风险', itemStyle: { color: '#ef4444' } }
                    ]
                }]
            };
            riskChart.setOption(option);
        }
        
        function updateCpuChart(data) {
            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: '#1e293b',
                    borderColor: '#334155',
                    textStyle: { color: '#e2e8f0' },
                    axisPointer: { type: 'shadow' }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: '#334155', type: 'dashed' } }
                },
                yAxis: {
                    type: 'category',
                    data: data.map(d => d.name).reverse(),
                    axisLine: { lineStyle: { color: '#334155' } },
                    axisLabel: { color: '#94a3b8', fontSize: 11 }
                },
                series: [{
                    type: 'bar',
                    data: data.map(d => ({
                        value: d.cpu,
                        itemStyle: {
                            color: d.cpu > 50 ? '#ef4444' : d.cpu > 20 ? '#f59e0b' : '#3b82f6'
                        }
                    })).reverse(),
                    barWidth: '60%',
                    borderRadius: [0, 4, 4, 0]
                }]
            };
            cpuChart.setOption(option);
        }
        
        function updateProcessTable(processes) {
            const tbody = document.getElementById('process-tbody');
            if (processes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">未发现可疑进程，系统状态良好 👍</td></tr>';
                return;
            }
            
            tbody.innerHTML = processes.map(p => `
                <tr>
                    <td>${p.pid}</td>
                    <td><strong>${escapeHtml(p.name)}</strong></td>
                    <td>${escapeHtml(p.username)}</td>
                    <td>${p.cpu_percent}%</td>
                    <td>${p.memory_percent}%</td>
                    <td class="threat-score ${p.threat_score >= 60 ? 'high' : p.threat_score >= 30 ? 'medium' : 'low'}">${p.threat_score}</td>
                    <td><span class="risk-badge risk-${p.risk_level}">${p.risk_level}</span></td>
                    <td class="indicators">${p.suspicious_indicators.map(i => `• ${escapeHtml(i)}`).join('<br>')}</td>
                </tr>
            `).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadData() {
            try {
                // 加载统计数据
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                
                document.getElementById('total-processes').textContent = stats.total_processes;
                document.getElementById('suspicious-count').textContent = stats.suspicious_count;
                document.getElementById('high-risk-count').textContent = stats.high_risk_count;
                document.getElementById('safe-count').textContent = stats.risk_distribution.safe;
                
                updateRiskChart(stats.risk_distribution);
                updateCpuChart(stats.top_cpu);
                
                // 加载可疑进程
                const suspRes = await fetch('/api/suspicious');
                const suspicious = await suspRes.json();
                updateProcessTable(suspicious.processes);
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('process-tbody').innerHTML = 
                    '<tr><td colspan="8" class="loading">加载失败，请刷新重试</td></tr>';
            }
        }
        
        window.addEventListener('resize', () => {
            riskChart && riskChart.resize();
            cpuChart && cpuChart.resize();
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadData();
            // 自动刷新每30秒
            setInterval(loadData, 30000);
        });
    </script>
</body>
</html>
